# Runner integration test: a no-LLM episode that ends by episode timeout.
# episode_id is omitted on purpose: the runner auto-generates a unique uuid4
# hex id per run, so concurrent test runs never collide.
app: noopapp
nats_url: nats://localhost:4222
environment:
  class: noop_app:NoopEnvironment
  config:
    setup_timeout: 10
    episode_timeout: 1.0
    grace_period: 0.3
agents:
  alpha:
    class: noop_app:NoopAgent
    config:
      grace_period: 0.3
  beta:
    class: noop_app:NoopAgent
    config:
      grace_period: 0.3
