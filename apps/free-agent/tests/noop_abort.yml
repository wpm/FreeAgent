# Runner integration test: an episode that aborts. The "ghost" agent's
# process launches but its run() raises immediately, so it never answers the
# presence request and the (tiny) setup timeout aborts the episode.
app: noopapp
nats_url: nats://localhost:4222
environment:
  class: noop_app:NoopEnvironment
  config:
    setup_timeout: 1.0
    episode_timeout: 30
    grace_period: 0.3
agents:
  alpha:
    class: noop_app:NoopAgent
    config:
      grace_period: 0.3
  ghost:
    class: noop_app:CrashingAgent
    config:
      grace_period: 0.3
