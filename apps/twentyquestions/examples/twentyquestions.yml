# Twenty Questions with a real LLM.
#
# The app's name, environment class, and roster (one Host plus the players
# alice/bob/carol) are defined in the application's source -- this file holds
# only per-episode tunables. No `model` is set anywhere, so the library's
# resolution chain picks one: the FREEAGENT_MODEL env var if set, otherwise the
# cheap tier of whichever provider API key is exported (ANTHROPIC_API_KEY,
# OPENAI_API_KEY, GEMINI_API_KEY).
#
# Recording is a per-run CLI decision, not config: add
# `--parquet-log out/twentyquestions.parquet` (a path that must not exist) to
# record the episode. Run from the repo root:
#
#   free-agent twenty-questions run apps/twentyquestions/examples/twentyquestions.yml \
#     --parquet-log out/twentyquestions.parquet

nats_url: nats://localhost:4222
environment:
  # A full 20-question game at real-LLM pace takes well over ten minutes;
  # the episode timeout is a backstop, not the expected ending.
  config: {setup_timeout: 30, episode_timeout: 1800, grace_period: 15}
agents:
  host:
    config:
      max_questions: 20
      grace_period: 15
      nudge_interval: 25
      # secret: a lighthouse   # omit to let the Host pick one at random
  alice:
    config: {grace_period: 15, nudge_interval: 20}
  bob:
    config: {grace_period: 15, nudge_interval: 20}
  carol:
    config: {grace_period: 15, nudge_interval: 20}
