# NATS server configuration for the Free Agent docker network.
# Published to the host's loopback interface by compose.yaml, so host processes (the API,
# workers, viewers' episodes) reach it as nats://localhost:4222.

listen: 0.0.0.0:4222

# HTTP monitoring endpoint (used for container health checks).
http: 0.0.0.0:8222

# Persist JetStream state to the mounted volume.
jetstream {
  store_dir: /data
}
