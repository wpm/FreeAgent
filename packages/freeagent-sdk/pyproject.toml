[project]
name = "freeagent-sdk"
version = "0.1.0"
description = "Library for building Free Agent applications"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "nats-py>=2.9",
    "pydantic>=2.13.4"
]

[project.scripts]
freeagent = "freeagent.sdk.schema:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
# The NATS compose file and server config under src/freeagent/sdk/_platform/ ship as package data
# (hatchling includes non-Python files under the packaged directory), so `freeagent.sdk.launch` can
# bring up the platform from any repo that only depends on the SDK, resolving them via
# importlib.resources.
packages = ["src/freeagent"]

[tool.mypy]
python_version = "3.12"
strict = true
# Treat src/ as the package root so the package is seen only as
# `freeagent.sdk.*`. Without this, running mypy from this directory resolves the
# same file under two module names (`sdk.agent` and `freeagent.sdk.agent`) and
# aborts with "Source file found twice under different module names".
mypy_path = ["src", "tests"]
explicit_package_bases = true
