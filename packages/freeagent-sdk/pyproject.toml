[project]
name = "freeagent-sdk"
version = "0.1.0"
description = "Library for building Free Agent applications"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "nats-py>=2.9",
    "pydantic>=2.13.4"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/freeagent"]
