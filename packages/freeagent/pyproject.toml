[project]
name = "freeagent"
version = "1.0.0"
description = "FreeAgent: a Python framework for real-time multi-agent LLM interaction with no turn-taking."
requires-python = ">=3.12"
dependencies = [
    "nats-py>=2.9",
    "litellm>=1.60",
    "loguru>=0.7",
    "pyarrow>=18.0",
    "pydantic>=2.10",
    "pyyaml>=6.0",
    "typer>=0.12",
]

[project.scripts]
free-agent = "freeagent.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/freeagent"]
