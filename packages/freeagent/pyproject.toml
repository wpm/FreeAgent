[project]
name = "freeagent"
version = "1.0.0"
description = "FreeAgent: a Python framework for real-time multi-agent LLM interaction with no turn-taking."
requires-python = ">=3.12"
dependencies = [
    "nats-py>=2.15.0",
    "litellm>=1.89.0",  # floor stays >=1.83.0 to exclude the 1.82.7/1.82.8 backdoor; see SECURITY.md
    "loguru>=0.7.3",
    "pyarrow>=24.0.0",
    "pydantic>=2.13.4",
    "pyyaml>=6.0.3",
    "typer>=0.26.7",
    "fastapi>=0.115",
    # The [standard] extra pulls in `websockets`, which uvicorn needs to serve
    # the per-episode feed WebSocket (#42). Without it the upgrade is rejected
    # ("Unsupported upgrade request") and the feed 404s -- see issue #47.
    "uvicorn[standard]>=0.34",
]

[project.scripts]
free-agent = "freeagent.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/freeagent"]
