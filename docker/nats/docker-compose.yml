# Standalone NATS for local development and the test suite.
#
# This brings up *only* NATS, with its client and monitoring ports published to
# the host, for running episodes from the CLI or the test suite against a local
# server. The full two-service application network (NATS + the episode service +
# UI) lives in ../compose.yml (ADR-0003). The websocket port is gone: the browser
# no longer speaks NATS.
services:
  nats:
    image: nats:2.12-alpine
    command: ["-c", "/etc/nats/nats-server.conf"]
    ports:
      - "${NATS_CLIENT_PORT:-4222}:4222"    # client connections
      - "${NATS_MONITOR_PORT:-8222}:8222"   # HTTP monitoring
    volumes:
      - ./nats-server.conf:/etc/nats/nats-server.conf:ro
      - nats-data:/data

volumes:
  nats-data:
