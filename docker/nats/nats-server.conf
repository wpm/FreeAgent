# FreeAgent NATS server configuration.
#
# Trusted local research testbed (see ADR-0001): no auth, and an unencrypted
# websocket listener is acceptable. Container-internal ports are fixed here;
# the host ports they publish to are set in docker-compose.yml.

# JetStream — viewers and the recorder rely on the per-episode stream and its
# stream_seq ordering, so it must stay enabled.
jetstream {
  store_dir: "/data"
}

# HTTP monitoring endpoint.
http: 0.0.0.0:8222

# Websocket listener so browser-based viewers can subscribe over nats.ws.
# no_tls is fine for local dev; see ADR-0001.
websocket {
  port: 8080
  no_tls: true
}
