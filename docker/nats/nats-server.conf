# FreeAgent NATS server configuration.
#
# Trusted local research testbed (see ADR-0001 / ADR-0003): no auth. The browser
# no longer speaks NATS (ADR-0003 puts the episode service between the UI and the
# wire), so the websocket listener that ADR-0001 added is gone -- NATS now serves
# only the Python service and the episode child processes. Container-internal
# ports are fixed here; the host ports they publish to (if any) are set in
# docker-compose.yml.

# JetStream — the durable record of every episode (its per-episode stream and
# stream_seq ordering) lives here, so it must stay enabled.
jetstream {
  store_dir: "/data"
}

# HTTP monitoring endpoint.
http: 0.0.0.0:8222
