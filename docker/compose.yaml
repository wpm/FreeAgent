name: freeagent

services:
  # No published ports: NATS is reachable only inside the network, as nats://nats:4222.
  nats:
    image: nats:2.12-alpine
    command: [ "-c", "/etc/nats/nats-server.conf" ]
    volumes:
      - ./nats/nats-server.conf:/etc/nats/nats-server.conf:ro
      - nats-data:/data
    healthcheck:
      # NATS exposes /healthz on its HTTP monitoring port.
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  nats-data:
