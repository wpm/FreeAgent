# The two-service FreeAgent backend network (ADR-0004).
#
# Two services on one private network:
#
#   nats       the durable record -- JetStream on a persistent volume. NATS is
#              INTERNAL to the network: it publishes no host ports.
#   freeagent  the episode service: an app-independent REST/JetStream API (plus
#              the per-episode WebSocket feed). It serves NO UI and bundles no
#              application. It is the ONLY service that publishes a port to the
#              host.
#
# This network is the FreeAgent *backend*. A UI (e.g. the Twenty Questions
# viewer) is a separate process run on the host that calls this API cross-origin
# -- it is NOT part of this network. A Parquet volume is mounted into freeagent
# for import/export edge I/O. Bring the backend up with
# `docker compose -f docker/compose.yml up --build`; the REST API answers at
# http://localhost:8000 (see ./README.md).
name: freeagent

services:
  nats:
    image: nats:2.12-alpine
    command: ["-c", "/etc/nats/nats-server.conf"]
    volumes:
      - ./nats/nats-server.conf:/etc/nats/nats-server.conf:ro
      - nats-data:/data
    # No published ports: NATS is reachable only inside the network, as
    # nats://nats:4222. A UI never speaks to it (ADR-0003/0004).

  freeagent:
    build:
      context: ..
      dockerfile: docker/freeagent/Dockerfile
    environment:
      # Episodes (and their child processes) use the in-network NATS.
      FREEAGENT_NATS_URL: "nats://nats:4222"
      # Confine import/export edge I/O to the mounted Parquet volume: a request's
      # parquet_path is resolved within this directory and may not escape it.
      FREEAGENT_PARQUET_DIR: "/data/parquet"
    # Bind 0.0.0.0 so the one published port is reachable from the host.
    command: ["free-agent", "serve", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "${FREEAGENT_PORT:-8000}:8000"   # the ONLY published port
    volumes:
      - parquet:/data/parquet
    depends_on:
      - nats

volumes:
  nats-data:
  parquet:
