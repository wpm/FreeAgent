repos:
  - repo: local
    hooks:
      - id: fmt
        name: cargo fmt
        language: system
        entry: cargo fmt --all -- --check
        pass_filenames: false
        types: [rust]

      - id: clippy
        name: cargo clippy
        language: system
        entry: cargo clippy --all-targets --all-features -- -D warnings
        pass_filenames: false
        types: [rust]
