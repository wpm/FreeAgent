# Twenty Questions with a real LLM.
#
# No `model` is set anywhere, so the library's resolution chain picks one:
# the FREEAGENT_MODEL env var if set, otherwise the cheap tier of whichever
# provider API key is exported (ANTHROPIC_API_KEY, OPENAI_API_KEY,
# GEMINI_API_KEY). System prompts default to twentyquestions.prompts.
#
# Run from the repo root:
#
#   free-agent run examples/twentyquestions.yml

app: twentyquestions
nats_url: nats://localhost:4222
recorder:
  enabled: true
  output: out/twentyquestions.parquet
environment:
  class: twentyquestions.environment:TwentyQuestionsEnvironment
  # A full 20-question game at real-LLM pace takes well over ten minutes;
  # the episode timeout is a backstop, not the expected ending.
  config: {setup_timeout: 30, episode_timeout: 1800, grace_period: 15}
agents:
  host:
    class: twentyquestions.host:Host
    config:
      max_questions: 20
      grace_period: 15
      # secret: a lighthouse   # omit to let the Host pick one at random
  alice:
    class: twentyquestions.player:Player
    config: {grace_period: 15, nudge_interval: 20}
  bob:
    class: twentyquestions.player:Player
    config: {grace_period: 15, nudge_interval: 20}
  carol:
    class: twentyquestions.player:Player
    config: {grace_period: 15, nudge_interval: 20}
