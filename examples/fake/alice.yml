# alice opens the deliberation on the Host's welcome, makes the winning guess
# after the second answer, and says goodbye on the game-over announcement.
default: {speak: false, message: ""}
responses:
  - match: "Welcome to Twenty Questions"
    response:
      speak: true
      message: >-
        Let's plan before we spend a question. I say we start broad --
        should we ask whether it is alive?
  - match: "question 2 of 20"
    response:
      speak: true
      message: >-
        Alive and living in the sea -- I am confident.
        Host, I guess: is it an octopus?
  - match: "GAME OVER"
    response: {speak: true, message: "What a game! Goodbye, everyone."}
