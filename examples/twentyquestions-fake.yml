# Twenty Questions with the deterministic fake LLM -- no network, no API keys.
#
# The app's name, environment class, and roster live in the application's
# source; this file holds only per-episode tunables. The canned scripts in
# examples/fake/ play out a complete two-question game ending in a correct
# guess ("an octopus"), followed by goodbyes inside the stopping grace period.
# The fake: paths are relative to the directory the command is invoked from, so
# run from the repo root:
#
#   free-agent twenty-questions run examples/twentyquestions-fake.yml

nats_url: nats://localhost:4222
recorder:
  enabled: true
  output: out/twentyquestions-fake.parquet
environment:
  config: {setup_timeout: 30, episode_timeout: 60, grace_period: 2}
agents:
  host:
    config:
      model: "fake:examples/fake/host.yml"
      secret: an octopus
      max_questions: 20
      grace_period: 2
  alice:
    config: {model: "fake:examples/fake/alice.yml", grace_period: 2}
  bob:
    config: {model: "fake:examples/fake/bob.yml", grace_period: 2}
  carol:
    config: {model: "fake:examples/fake/carol.yml", grace_period: 2}
